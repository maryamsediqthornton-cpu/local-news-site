<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Witney Wire</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <main class="form-page">
    <section class="form-card">
  <h1>Contact Witney Wire</h1>
  <p>For general company enquiries, use this form. When submitted, it opens an email addressed to <strong>info@witneywire.co.uk</strong>.</p>
  <form class="form-grid" action="mailto:info@witneywire.co.uk" method="post" enctype="text/plain">
    <label for="name">Your name</label>
    <input id="name" name="Name" required>
    <label for="email">Your email</label>
    <input id="email" name="Email" type="email" required>
    <label for="subject">Subject</label>
    <input id="subject" name="Subject">
    <label for="message">Message</label>
    <textarea id="message" name="Message" required></textarea>
    <div class="form-actions">
      <button class="form-submit" type="submit">Email Witney Wire</button>
      <span class="form-note">This opens your email app so you can review before sending.</span>
    </div>
  </form>
</section>
  </main>
</body>
</html>
